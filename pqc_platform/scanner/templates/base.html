<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PQC Security Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

/* Sidebar */

.sidebar{
height:100vh;
background:#111827;
color:white;
padding-top:20px;
position:fixed;
width:220px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:#cbd5e1;
padding:12px 20px;
text-decoration:none;
font-size:15px;
}

.sidebar a:hover{
background:#1f2937;
color:white;
}

/* Main content */

.main-content{
margin-left:220px;
padding:20px;
}

/* Navbar */

.topbar{
background:white;
border-bottom:1px solid #ddd;
padding:10px 20px;
margin-bottom:20px;
}

.card{
border:none;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

</style>

</head>


<body>


{% if user.is_authenticated %}

<!-- SIDEBAR -->

<div class="sidebar">

<h4>PQC Monitor</h4>

<a href="/dashboard/">Dashboard</a>

<a href="/scan/">Scan Asset</a>

<a href="/assets/">Asset Inventory</a>

<a href="/cbom/">CBOM</a>

<a href="/pqc-posture/">PQC Posture</a>

<a href="/reporting/">Reporting</a>

<a href="/logout/">Logout</a>

</div>

{% endif %}


<div class="{% if user.is_authenticated %}main-content{% endif %}">

{% if user.is_authenticated %}

<div class="topbar d-flex justify-content-between">

<div>
<b>Quantum-Ready Cybersecurity Platform</b>
</div>

<div>
Logged in as <b>{{ user.username }}</b>
</div>

</div>

{% endif %}


{% block content %}
{% endblock %}


</div>


</body>

</html>
